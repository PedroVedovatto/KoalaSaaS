<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/koala.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoalaSaaS - Gestão de Contratos</title>
    
    <!-- Pré-carregamento agressivo do vídeo -->
    <link rel="preload" href="/videos/Koala.mp4" as="video" type="video/mp4" />
    <link rel="preload" href="https://www.w3schools.com/html/mov_bbb.mp4" as="video" type="video/mp4" />
    
    <!-- Script de pré-carregamento instantâneo -->
    <script>
      // Pré-carregar vídeo antes de qualquer outra coisa
      (function() {
        var video = document.createElement('video');
        video.preload = 'auto';
        video.muted = true;
        video.loop = true;
        video.playsInline = true;
        
        var source = document.createElement('source');
        source.src = '/videos/Koala.mp4';
        source.type = 'video/mp4';
        
        var fallbackSource = document.createElement('source');
        fallbackSource.src = 'https://www.w3schools.com/html/mov_bbb.mp4';
        fallbackSource.type = 'video/mp4';
        
        video.appendChild(source);
        video.appendChild(fallbackSource);
        
        // Armazenar globalmente para uso futuro
        window.preloadedVideo = video;
        
        // Começar carregamento imediatamente
        video.load();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
